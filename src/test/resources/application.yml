spring:
  datasource:
    url: jdbc:h2:mem:cloud-${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/streamlinker-cloud-schema-h2.sql

streamlinker:
  zlm:
    base-url: http://127.0.0.1:80
    secret: test-secret